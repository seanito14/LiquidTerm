name: LiquidTerm
options:
  bundleIdPrefix: com.liquidterm
  deploymentTarget:
    macOS: "14.0"
targets:
  LiquidTerm:
    type: application
    platform: macOS
    sources:
      - path: ContentView.swift
      - path: LiquidTermApp.swift
      - path: CommandPalette.swift
      - path: Pane
      - path: Settings
      - path: Terminal
      - path: Utilities
      - path: WindowManager
    settings:
      base:
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: 14.0
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
